name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Build And Tests
    uses: ./.github/workflows/build-and-test.yml
    with:
      create_deployment_package: true

  deploy_production:
    name: Deploy To Production
    needs: validate
    runs-on: windows-2022
    environment: production
    steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        name: nemestats-web-package
        path: ${{ github.workspace }}\deployment-package

    - name: Azure login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to production app service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        package: ${{ github.workspace }}\deployment-package\nemestats-web.zip

    - name: Smoke test production deployment
      run: |
        $attempts = 12
        $delaySeconds = 10
        $targetUrl = "${{ secrets.PRODUCTION_SMOKE_TEST_URL }}"

        for ($attempt = 1; $attempt -le $attempts; $attempt++) {
          try {
            $response = Invoke-WebRequest -Uri $targetUrl -UseBasicParsing -TimeoutSec 30
            if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 400) {
              Write-Host "Smoke test succeeded with status code $($response.StatusCode)."
              exit 0
            }
          } catch {
            Write-Host "Smoke test attempt $attempt failed: $($_.Exception.Message)"
          }

          if ($attempt -lt $attempts) {
            Start-Sleep -Seconds $delaySeconds
          }
        }

        throw "Smoke test failed for $targetUrl after $attempts attempts."
      shell: pwsh
