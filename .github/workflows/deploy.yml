name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Build And Tests
    runs-on: windows-2022
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Build and test
      uses: ./.github/actions/build-and-test

  deploy_production:
    name: Deploy To Production
    needs: validate
    runs-on: windows-2022
    environment: production
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      PACKAGE_TMP_PATH: ${{ github.workspace }}\Source\UI\obj\Release\Package\PackageTmp
      PACKAGE_PATH: ${{ github.workspace }}\artifacts\nemestats-web.zip
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v4

    - name: Restore NuGet packages
      run: nuget restore NemeStats.sln
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Seed safe PrivateAppSettings for publish
      run: Copy-Item -LiteralPath Miscellaneous\PrivateAppSettings.config -Destination Source\UI\PrivateAppSettings.config -Force
      shell: pwsh

    - name: Publish web app locally
      run: |
        if (Test-Path $env:PACKAGE_TMP_PATH) {
          Remove-Item -LiteralPath $env:PACKAGE_TMP_PATH -Recurse -Force
        }
        if (Test-Path -LiteralPath $env:PACKAGE_PATH) {
          Remove-Item -LiteralPath $env:PACKAGE_PATH -Force
        }
        msbuild Source\UI\UI.csproj `
          /p:Configuration=Release `
          /p:Platform=AnyCPU `
          /p:DeployOnBuild=true `
          /p:WebPublishMethod=FileSystem `
          /p:DeleteExistingFiles=true `
          /p:publishUrl="${{ github.workspace }}\artifacts\publish"
      shell: pwsh

    - name: Inspect package temp output
      run: |
        if (-not (Test-Path -LiteralPath $env:PACKAGE_TMP_PATH)) {
          throw "MSBuild package temp directory was not created: $env:PACKAGE_TMP_PATH"
        }

        $packageItems = Get-ChildItem -LiteralPath $env:PACKAGE_TMP_PATH -Force
        if (-not $packageItems) {
          throw "MSBuild package temp directory is empty: $env:PACKAGE_TMP_PATH"
        }

        Write-Host "MSBuild package temp contents:"
        $packageItems |
          Select-Object FullName, Length, LastWriteTime |
          Format-Table -AutoSize
      shell: pwsh

    - name: Create Zip Deploy package
      run: |
        $packageDirectory = Split-Path -Parent $env:PACKAGE_PATH
        if (-not (Test-Path -LiteralPath $packageDirectory)) {
          New-Item -ItemType Directory -Path $packageDirectory -Force | Out-Null
        }

        $packageItems = Get-ChildItem -LiteralPath $env:PACKAGE_TMP_PATH -Force
        if (-not $packageItems) {
          throw "No packaged site files found in $env:PACKAGE_TMP_PATH"
        }

        Compress-Archive -LiteralPath $packageItems.FullName -DestinationPath $env:PACKAGE_PATH

        if (-not (Test-Path -LiteralPath $env:PACKAGE_PATH)) {
          throw "Zip Deploy package was not created: $env:PACKAGE_PATH"
        }

        Get-Item -LiteralPath $env:PACKAGE_PATH |
          Select-Object FullName, Length, LastWriteTime |
          Format-Table -AutoSize
      shell: pwsh

    - name: Azure login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy to production app service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        package: ${{ env.PACKAGE_PATH }}

    - name: Smoke test production deployment
      run: |
        $attempts = 12
        $delaySeconds = 10
        $targetUrl = "${{ secrets.PRODUCTION_SMOKE_TEST_URL }}"

        for ($attempt = 1; $attempt -le $attempts; $attempt++) {
          try {
            $response = Invoke-WebRequest -Uri $targetUrl -UseBasicParsing -TimeoutSec 30
            if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 400) {
              Write-Host "Smoke test succeeded with status code $($response.StatusCode)."
              exit 0
            }
          } catch {
            Write-Host "Smoke test attempt $attempt failed: $($_.Exception.Message)"
          }

          if ($attempt -lt $attempts) {
            Start-Sleep -Seconds $delaySeconds
          }
        }

        throw "Smoke test failed for $targetUrl after $attempts attempts."
      shell: pwsh
