name: Build And Test

on:
  workflow_call:
    inputs:
      create_deployment_package:
        required: false
        type: boolean
        default: false

jobs:
  build_and_test:
    name: Build And Test
    runs-on: windows-2022
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      PUBLISH_OUTPUT: ${{ github.workspace }}\artifacts\publish
      PACKAGE_PATH: ${{ github.workspace }}\artifacts\nemestats-web.zip
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v4

    - name: Restore NuGet packages
      run: nuget restore NemeStats.sln

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Build solution
      run: msbuild NemeStats.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Run tests (excluding Integration)
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.PackageGroup.TestTools.Core -property installationPath
        $vstestPath = Join-Path $vsPath "Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe"
        $testDlls = Get-ChildItem -Recurse -Filter *.Tests.dll | Where-Object {
          $_.FullName -notlike '*\obj\*' -and $_.FullName -notlike '*\packages\*'
        }
        $dllPaths = $testDlls | ForEach-Object { $_.FullName }
        & $vstestPath $dllPaths /TestCaseFilter:"FullyQualifiedName!~Integration" /Logger:trx
        exit $LASTEXITCODE
      shell: pwsh

    - name: Upload test results
      if: success() || failure()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: '**/*.trx'

    - name: Publish test results
      if: success() || failure()
      uses: dorny/test-reporter@v3
      with:
        name: VSTest Results
        path: '**/*.trx'
        reporter: dotnet-trx
        fail-on-error: false

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: BuildArtifacts
        path: |
          **/bin/Release/
          **/bin/Release/*

    - name: Seed safe PrivateAppSettings for publish
      if: ${{ inputs.create_deployment_package }}
      run: Copy-Item -LiteralPath Miscellaneous\PrivateAppSettings.config -Destination Source\UI\PrivateAppSettings.config -Force
      shell: pwsh

    - name: Publish web app locally
      if: ${{ inputs.create_deployment_package }}
      run: |
        if (Test-Path $env:PUBLISH_OUTPUT) {
          Remove-Item -LiteralPath $env:PUBLISH_OUTPUT -Recurse -Force
        }
        New-Item -ItemType Directory -Path $env:PUBLISH_OUTPUT | Out-Null
        msbuild Source\UI\UI.csproj `
          /p:Configuration=Release `
          /p:Platform=AnyCPU `
          /p:DeployOnBuild=true `
          /p:WebPublishMethod=FileSystem `
          /p:DeleteExistingFiles=true `
          /p:publishUrl="$env:PUBLISH_OUTPUT"
      shell: pwsh

    - name: Package published site
      if: ${{ inputs.create_deployment_package }}
      run: |
        if (Test-Path $env:PACKAGE_PATH) {
          Remove-Item -LiteralPath $env:PACKAGE_PATH -Force
        }
        Compress-Archive -Path "$env:PUBLISH_OUTPUT\*" -DestinationPath $env:PACKAGE_PATH
      shell: pwsh

    - name: Upload deployment package
      if: ${{ inputs.create_deployment_package }}
      uses: actions/upload-artifact@v7
      with:
        name: nemestats-web-package
        path: ${{ env.PACKAGE_PATH }}
