# GitHub Actions CI for NemeStats
# Windows, .NET Framework, NuGet restore, build, test (excluding Integration)

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-2022
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore NemeStats.sln

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build solution
      run: msbuild NemeStats.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Run tests (excluding Integration)
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.PackageGroup.TestTools.Core -property installationPath
        $vstestPath = Join-Path $vsPath "Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe"
        $testDlls = Get-ChildItem -Recurse -Filter *.Tests.dll | Where-Object { $_.FullName -notmatch 'Integration' }
        foreach ($dll in $testDlls) {
          & $vstestPath $dll.FullName
        }
      shell: pwsh

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BuildArtifacts
        path: |
          **/bin/Release/
          **/bin/Release/*
