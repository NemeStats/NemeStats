# GitHub Actions CI for NemeStats
# Windows, .NET Framework, NuGet restore, build, test (excluding Integration)

name: CI

on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Validate Build And Tests
    runs-on: windows-2022
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Build and test
      uses: ./.github/actions/build-and-test
