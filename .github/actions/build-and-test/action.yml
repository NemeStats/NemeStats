name: Build And Test
description: Restore packages, build the solution, run non-integration tests, and publish test artifacts.
inputs:
  solution-path:
    description: Solution file to build
    required: false
    default: NemeStats.sln
  configuration:
    description: Build configuration
    required: false
    default: Release
  platform:
    description: MSBuild platform
    required: false
    default: Any CPU
runs:
  using: composite
  steps:
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v4

    - name: Restore NuGet packages
      shell: pwsh
      run: nuget restore "${{ inputs.solution-path }}"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Build solution
      shell: pwsh
      run: msbuild "${{ inputs.solution-path }}" /p:Configuration="${{ inputs.configuration }}" /p:Platform="${{ inputs.platform }}"

    - name: Run tests (excluding Integration)
      shell: pwsh
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.PackageGroup.TestTools.Core -property installationPath
        $vstestPath = Join-Path $vsPath "Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe"
        $testDlls = Get-ChildItem -Recurse -Filter *.Tests.dll | Where-Object {
          $_.FullName -notlike '*\obj\*' -and $_.FullName -notlike '*\packages\*'
        }
        $dllPaths = $testDlls | ForEach-Object { $_.FullName }
        & $vstestPath $dllPaths /TestCaseFilter:"FullyQualifiedName!~Integration" /Logger:trx
        exit $LASTEXITCODE

    - name: Upload test results
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/*.trx'

    - name: Publish test results
      if: success() || failure()
      uses: dorny/test-reporter@v3
      with:
        name: VSTest Results
        path: '**/*.trx'
        reporter: dotnet-trx
        fail-on-error: false
